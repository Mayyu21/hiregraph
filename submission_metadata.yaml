ai_usage_summary: |
  Used Claude for system architecture design, signal extractor logic, fusion engine
  design, code review, and README writing. Used Gemini 2.0 Flash API only during
  preprocessing phase to parse the job description into structured JSON. No candidate
  data was fed to any external LLM. Ranking phase uses zero API calls — pure CPU math.
  Used Google Antigravity as the agentic development environment.

methodology_summary: |
  HireGraph is a 4-signal multi-layer candidate ranking engine. Phase 1 preprocessing
  parses the JD with Gemini API and computes all-MiniLM-L6-v2 embeddings (384-dim)
  for 100k candidates using FAISS IndexFlatIP. Phase 2 ranking (zero API calls,
  CPU only, 21.6 seconds) scores candidates on: semantic cosine similarity (35%),
  profile signal with proficiency-weighted skill matching and education tier (30%),
  career trajectory measuring upward progression velocity and domain alignment (25%),
  and a behavioral multiplier using all 23 Redrob signals for hiring availability.
  Honeypot detection catches 42 impossible profiles. Hidden gem detection surfaces
  7450 underrated candidates. Final output: exactly 100 ranked candidates with
  factual reasoning strings referencing specific profile attributes.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true